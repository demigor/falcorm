name: "Publish NuGet"

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.0.0). If empty, uses tag refs/tags/v*'
        required: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Derive package version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.0-ci.${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi
          echo "Package version is $(cat $GITHUB_OUTPUT | grep version | cut -d= -f2)"

      - name: "Build Falcorm (all TFMs: net8.0, net9.0, net10.0)"
        working-directory: src
        run: |
          dotnet build Falcorm/Istarion.Falcorm.csproj -c Release 

      - name: Pack (all TFMs; --no-build uses outputs from previous step)
        working-directory: src
        run: dotnet pack Falcorm/Istarion.Falcorm.csproj -c Release -o nugets --no-build /p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Push to nuget.org
        run: |
          dotnet nuget push "src/nugets/*.nupkg" \
            --api-key ${{ secrets.NUGET_TOKEN }} \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate
